<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Zyra Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6C3DE8, #E84B3D);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #fff;
      margin: 0 auto 28px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem; font-weight: 700;
      color: #fff; margin-bottom: 16px;
    }
    p {
      color: rgba(255,255,255,0.65);
      line-height: 1.7; margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #6C3DE8, #E84B3D);
      color: #fff; text-decoration: none;
      padding: 14px 32px; border-radius: 100px;
      font-weight: 600; font-size: 0.95rem;
      transition: transform 0.2s, opacity 0.2s;
    }
    a:hover { transform: translateY(-2px); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Message Received!</h1>
    <p>
      Thanks for reaching out to Zyra Hub. We've received your message
      and will get back to you within <strong style="color:#fff;">24 hours</strong>.
    </p>
    <a href="/">← Back to Zyra Hub</a>
  </div>
</body>
</html>
