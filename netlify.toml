# ============================================================
# NETLIFY CONFIGURATION — ZYRA HUB
# This file tells Netlify how to deploy the site.
# ============================================================

[build]
  # The folder containing your built site (this is a static site
  # so it's just the root folder)
  publish = "."

# ===== Redirect Rules =====
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ===== HTTP Headers =====
# These headers improve performance and security.
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Cache static assets aggressively
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    # Don't cache HTML so updates deploy instantly
    Cache-Control = "public, max-age=0, must-revalidate"
